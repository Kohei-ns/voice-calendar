<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>声でカレンダー</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #7c6cff;
    --accent2: #ff6cb0;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #4cffb0;
    --error: #ff6060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(124,108,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -40%;
    right: -20%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(255,108,176,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .header {
    text-align: center;
    padding: 8px 0 4px;
  }

  .header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .setup-card { display: none; }
  .setup-card.visible { display: block; }

  .card-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }

  .input-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .input-wrap label {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 300;
  }

  input[type="text"], input[type="password"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus { border-color: var(--accent); }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
    transition: all 0.2s;
    width: 100%;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #9c6cff);
    color: white;
    padding: 12px 20px;
    font-size: 0.85rem;
  }

  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-google {
    background: white;
    color: #333;
    padding: 12px 20px;
    font-size: 0.85rem;
    border: 1px solid #ddd;
  }

  .btn-google:hover { background: #f5f5f5; }

  .btn-google svg { width: 18px; height: 18px; }

  /* Main UI */
  .main-ui { display: none; }
  .main-ui.visible { display: flex; flex-direction: column; gap: 20px; }

  /* Mic Button */
  .mic-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 32px 20px;
  }

  .mic-btn {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
    box-shadow: 0 0 0 0 rgba(124,108,255,0.4);
  }

  .mic-btn:hover { transform: scale(1.05); }
  .mic-btn:active { transform: scale(0.97); }

  .mic-btn.recording {
    animation: pulse 1.2s ease-in-out infinite;
    background: linear-gradient(135deg, var(--accent2), #ff4040);
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,108,176,0.5); }
    70% { box-shadow: 0 0 0 24px rgba(255,108,176,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,108,176,0); }
  }

  .mic-btn svg { width: 36px; height: 36px; fill: white; }

  .mic-label {
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 300;
    text-align: center;
  }

  .mic-label.recording { color: var(--accent2); }

  /* Transcript */
  .transcript-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    min-height: 60px;
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.6;
  }

  .transcript-box.empty { color: var(--muted); font-weight: 300; }

  /* Result */
  .result-box {
    border-radius: 10px;
    padding: 14px;
    font-size: 0.84rem;
    line-height: 1.7;
    display: none;
  }

  .result-box.success {
    display: block;
    background: rgba(76,255,176,0.08);
    border: 1px solid rgba(76,255,176,0.3);
    color: var(--success);
  }

  .result-box.error {
    display: block;
    background: rgba(255,96,96,0.08);
    border: 1px solid rgba(255,96,96,0.3);
    color: var(--error);
  }

  .result-box.loading {
    display: block;
    background: rgba(124,108,255,0.08);
    border: 1px solid rgba(124,108,255,0.3);
    color: var(--accent);
  }

  /* History */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
    overflow-y: auto;
  }

  .history-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 0.78rem;
  }

  .history-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    margin-top: 5px;
    flex-shrink: 0;
  }

  .history-text { color: var(--text); line-height: 1.5; }
  .history-time { color: var(--muted); font-size: 0.7rem; margin-top: 2px; }

  .empty-history {
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 300;
    text-align: center;
    padding: 16px;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.72rem;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
  }

  .status-text { color: var(--muted); }

  .settings-link {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: right;
    cursor: pointer;
    text-decoration: underline;
    margin-top: -10px;
  }

  .settings-link:hover { color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(124,108,255,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎤 声でカレンダー</h1>
    <p>話すだけで予定を追加</p>
  </div>

  <!-- Setup Card -->
  <div class="card setup-card" id="setupCard">
    <div class="card-title">初回設定</div>
    <div class="input-group">
      <div class="input-wrap">
        <label>Claude APIキー</label>
        <input type="password" id="claudeKey" placeholder="sk-ant-api03-..." />
      </div>
    </div>
    <button class="btn btn-google" id="googleAuthBtn" onclick="startGoogleAuth()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Googleアカウントで連携する
    </button>
    <div style="margin-top:10px">
      <button class="btn btn-primary" onclick="saveSetup()">設定を保存</button>
    </div>
  </div>

  <!-- Main UI -->
  <div class="main-ui" id="mainUI">
    <div class="status-bar">
      <div class="status-dot"></div>
      <span class="status-text" id="statusText">Googleカレンダーに接続済み</span>
    </div>

    <div class="card">
      <div class="mic-area">
        <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </button>
        <div class="mic-label" id="micLabel">タップして話す</div>
      </div>

      <div class="transcript-box empty" id="transcriptBox">
        例：「来週月曜の14時に歯医者」
      </div>
    </div>

    <div class="result-box" id="resultBox"></div>

    <div class="card">
      <div class="card-title">追加履歴</div>
      <div class="history-list" id="historyList">
        <div class="empty-history">まだ予定が追加されていません</div>
      </div>
    </div>

    <div class="settings-link" onclick="showSetup()">⚙ 設定を変更</div>
  </div>
</div>

<script>
const CLIENT_ID = '909170806835-c3v83l73e58n8879o47jk4kvl765uvvt.apps.googleusercontent.com';
const CLIENT_SECRET = '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';
const REDIRECT_URI = window.location.href.split('?')[0].split('#')[0];
const SCOPES = 'https://www.googleapis.com/auth/calendar';

let isRecording = false;
let recognition = null;
let accessToken = null;
let history = [];

// Init
window.onload = () => {
  loadSettings();
  handleOAuthCallback();
};

function loadSettings() {
  const claudeKey = localStorage.getItem('claudeKey');
  const token = localStorage.getItem('googleToken');
  const tokenExpiry = localStorage.getItem('googleTokenExpiry');

  if (token && tokenExpiry && Date.now() < parseInt(tokenExpiry)) {
    accessToken = token;
  }

  if (claudeKey && accessToken) {
    showMainUI();
  } else {
    document.getElementById('setupCard').classList.add('visible');
    if (claudeKey) document.getElementById('claudeKey').value = claudeKey;
  }

  const saved = localStorage.getItem('calendarHistory');
  if (saved) {
    history = JSON.parse(saved);
    renderHistory();
  }
}

function handleOAuthCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (!code) return;

  // Exchange code for token
  fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      code,
      client_id: CLIENT_ID,
      client_secret: CLIENT_SECRET,
      redirect_uri: REDIRECT_URI,
      grant_type: 'authorization_code'
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.access_token) {
      accessToken = data.access_token;
      localStorage.setItem('googleToken', accessToken);
      const expiry = Date.now() + (data.expires_in - 60) * 1000;
      localStorage.setItem('googleTokenExpiry', expiry.toString());
      if (data.refresh_token) {
        localStorage.setItem('googleRefreshToken', data.refresh_token);
      }
      window.history.replaceState({}, document.title, window.location.pathname);
      const claudeKey = localStorage.getItem('claudeKey');
      if (claudeKey) showMainUI();
      else {
        document.getElementById('setupCard').classList.add('visible');
        document.getElementById('statusText') && (document.getElementById('statusText').textContent = 'Google連携完了！Claude APIキーを入力してください');
      }
    }
  })
  .catch(err => console.error(err));
}

function startGoogleAuth() {
  const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
    `client_id=${CLIENT_ID}&` +
    `redirect_uri=${encodeURIComponent(REDIRECT_URI)}&` +
    `response_type=code&` +
    `scope=${encodeURIComponent(SCOPES)}&` +
    `access_type=offline&` +
    `prompt=consent`;
  window.location.href = authUrl;
}

function saveSetup() {
  const claudeKey = document.getElementById('claudeKey').value.trim();
  if (!claudeKey) {
    alert('Claude APIキーを入力してください');
    return;
  }
  if (!accessToken) {
    alert('先にGoogleアカウントで連携してください');
    return;
  }
  localStorage.setItem('claudeKey', claudeKey);
  showMainUI();
}

function showMainUI() {
  document.getElementById('setupCard').classList.remove('visible');
  document.getElementById('mainUI').classList.add('visible');
}

function showSetup() {
  document.getElementById('mainUI').classList.remove('visible');
  document.getElementById('setupCard').classList.add('visible');
  const claudeKey = localStorage.getItem('claudeKey');
  if (claudeKey) document.getElementById('claudeKey').value = claudeKey;
}

function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showResult('error', 'お使いのブラウザは音声認識に対応していません。ChromeまたはSafariをお使いください。');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micLabel').textContent = '聞いています...';
    document.getElementById('micLabel').classList.add('recording');
    document.getElementById('transcriptBox').textContent = '';
    document.getElementById('transcriptBox').classList.remove('empty');
    hideResult();
  };

  recognition.onresult = (e) => {
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    document.getElementById('transcriptBox').textContent = transcript;
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micLabel').textContent = 'タップして話す';
    document.getElementById('micLabel').classList.remove('recording');

    const text = document.getElementById('transcriptBox').textContent.trim();
    if (text) {
      processVoiceInput(text);
    }
  };

  recognition.onerror = (e) => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micLabel').textContent = 'タップして話す';
    document.getElementById('micLabel').classList.remove('recording');
    showResult('error', `音声認識エラー: ${e.error}`);
  };

  recognition.start();
}

function stopRecording() {
  if (recognition) recognition.stop();
}

async function processVoiceInput(text) {
  showResult('loading', '<span class="spinner"></span>AIが予定を解析中...');

  const claudeKey = localStorage.getItem('claudeKey');
  const now = new Date();
  const nowStr = now.toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': claudeKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: `現在の日時: ${nowStr} (Asia/Tokyo)

以下の発言から予定情報をJSON形式で抽出してください。
発言: "${text}"

以下のJSON形式のみで返してください（他のテキストは不要）:
{
  "title": "予定のタイトル",
  "start": "2024-01-15T14:00:00+09:00",
  "end": "2024-01-15T15:00:00+09:00",
  "description": "補足情報（あれば）"
}

ルール:
- 時間が不明な場合はその日の09:00-10:00とする
- 終了時間が不明な場合は開始+1時間とする
- 日付は現在日時を基準に解釈する
- タイムゾーンは必ず+09:00を使う`
        }]
      })
    });

    const data = await response.json();
    const content = data.content[0].text.trim();

    let eventData;
    try {
      const jsonMatch = content.match(/\{[\s\S]*\}/);
      eventData = JSON.parse(jsonMatch ? jsonMatch[0] : content);
    } catch {
      throw new Error('予定情報の解析に失敗しました');
    }

    showResult('loading', '<span class="spinner"></span>Googleカレンダーに追加中...');
    await addToCalendar(eventData);

  } catch (err) {
    showResult('error', `エラー: ${err.message}`);
  }
}

async function addToCalendar(eventData) {
  const event = {
    summary: eventData.title,
    description: eventData.description || '',
    start: { dateTime: eventData.start, timeZone: 'Asia/Tokyo' },
    end: { dateTime: eventData.end, timeZone: 'Asia/Tokyo' }
  };

  const response = await fetch(
    'https://www.googleapis.com/calendar/v3/calendars/primary/events',
    {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${accessToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(event)
    }
  );

  if (response.status === 401) {
    localStorage.removeItem('googleToken');
    localStorage.removeItem('googleTokenExpiry');
    showResult('error', 'Googleの認証が切れました。再度「設定を変更」からGoogle連携をしてください。');
    return;
  }

  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || 'カレンダーへの追加に失敗しました');
  }

  const startDate = new Date(eventData.start);
  const dateStr = startDate.toLocaleString('ja-JP', {
    month: 'long', day: 'numeric', weekday: 'short',
    hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Tokyo'
  });

  showResult('success', `✅ 追加しました！\n「${eventData.title}」\n${dateStr}`);

  // Add to history
  const historyItem = {
    title: eventData.title,
    date: dateStr,
    time: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })
  };
  history.unshift(historyItem);
  if (history.length > 10) history.pop();
  localStorage.setItem('calendarHistory', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = '<div class="empty-history">まだ予定が追加されていません</div>';
    return;
  }
  list.innerHTML = history.map(item => `
    <div class="history-item">
      <div class="history-dot"></div>
      <div>
        <div class="history-text">${item.title}</div>
        <div class="history-time">${item.date}　追加: ${item.time}</div>
      </div>
    </div>
  `).join('');
}

function showResult(type, message) {
  const box = document.getElementById('resultBox');
  box.className = `result-box ${type}`;
  box.innerHTML = message.replace(/\n/g, '<br>');
}

function hideResult() {
  const box = document.getElementById('resultBox');
  box.className = 'result-box';
}
</script>
</body>
</html>
